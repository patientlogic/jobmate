name: CI

on:
  pull_request:
    branches: [dev, main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: "3306"
      DATABASE_USER: ci
      DATABASE_PASSWORD: unused
      DATABASE_NAME: jobmate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - run: npm run db:generate

      - run: npm run lint

      - run: npm test
